<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Termo Arena Vander</title>
    <style>
        :root { --bg: #6e5c62; --tile: #615458; --correct: #3aa394; --present: #d3ad69; --absent: #312a2c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; touch-action: manipulation; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; align-items: center; justify-content: center; }
        
        #login { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #4a3f43; padding: 30px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        
        header { width: 100%; padding: 10px; text-align: center; position: absolute; top: 0; }
        .logo { font-size: 2rem; font-weight: 900; letter-spacing: 5px; }
        
        #container { flex: 1; display: grid; gap: 10px; padding: 70px 15px 15px; justify-content: center; align-content: center; width: 100%; }
        .grid { display: grid; gap: 5px; }
        .tile { background: var(--tile); border: 2px solid #75666a; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 2rem; border-radius: 4px; aspect-ratio: 1/1; width: clamp(45px, 12vw, 55px); text-transform: uppercase; }
        .selected { border: 3px solid white !important; }
        
        .keyboard { width: 100%; padding: 10px 5px 30px; background: rgba(0,0,0,0.2); }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 8px; }
        .key { background: #818384; border: none; color: white; padding: 18px 0; border-radius: 4px; font-weight: bold; font-size: 1rem; flex: 1; text-align: center; cursor: pointer; }
        .key.wide { flex: 1.5; font-size: 0.7rem; }

        .c { background: var(--correct) !important; border: none; }
        .p { background: var(--present) !important; border: none; }
        .a { background: var(--absent) !important; border: none; }
        #toast { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 15px; border-radius: 8px; font-weight: bold; display: none; z-index: 10000; text-align: center; }
    </style>
</head>
<body>

    <div id="login">
        <div class="card">
            <h1 style="letter-spacing:5px; margin-bottom:20px">TERMO</h1>
            <input type="text" id="nick" style="background:#312a2c; border:2px solid #555; color:white; padding:15px; width:100%; border-radius:8px; margin-bottom:15px; text-align:center;" placeholder="SEU NOME">
            <button onclick="entrar()" style="background:var(--correct); color:white; border:none; padding:15px; width:100%; border-radius:8px; font-weight:bold;">JOGAR</button>
        </div>
    </div>

    <header id="h-game" style="display:none"><div class="logo">TERMO</div></header>
    <div id="toast"></div>
    <div id="container"></div>

    <div class="keyboard" id="kb-game" style="display:none">
        <div class="kb-row" id="row1"></div>
        <div class="kb-row" id="row2"></div>
        <div class="kb-row" id="row3"></div>
    </div>

    <script>
        // LISTA AMPLIADA COM PLURAIS
        const PALAVRAS = ["SAGAZ", "TERMO", "NOBRE", "MEXER", "AFETO", "VIGOR", "FAZER", "IDEIA", "PODER", "MUITO", "MESAS", "CASAS", "LIVRO", "PRATO", "GATOS", "ARENA", "VALOR", "CASA", "ATIVO", "SORTE", "BANCO", "VIVER", "TEMPO", "FORTE", "PORTA", "GENTE", "MUNDO", "PEDRA", "RADIO", "TIGRE", "VERBO", "FRASE", "FESTA", "FOGO", "AGUA", "ROUPA", "CORPO", "MENTE", "NOITE", "VISTA", "CAMPO", "CHAMA", "TREM", "CALOR", "FRIO", "CAIXA", "LUCRO", "JUROS", "BOLSA", "RENDA", "SENDO", "ESTAR", "HAVER", "NOSSO", "AMADO", "UNIAO", "TOTAL", "UNICO", "NOVO", "VELHO", "POBRE", "RICO", "NOME", "AQUI", "VIDA", "SAUDE", "MEDO", "TUDO", "NADA", "ALMA", "ALTO", "BAIXO", "OURO", "PRATA", "COPA", "JOGO", "DADO", "META", "ALVO", "ANOS", "MESES", "HORA", "ONDE", "COMO", "QUAL", "POUCO", "PAZ", "MAR", "RIO", "FLUXO", "AREA", "FORCA", "PESO", "LUZ", "SOM", "VOZ", "DOR", "RISO", "DEDO", "FLOR", "FRUTA", "CAFE", "DOCE", "SAL", "MEL", "BOLO", "OVO", "BOI", "VACA", "SAPO", "SOL", "LUA", "AREIA", "NUVEM", "CHUVA", "AÇO", "TELA", "VERDE", "AZUL", "ROXO", "ROSA", "BOLA", "GOL", "TIME", "REDE", "BASE", "TOPO", "FASE", "OBRA", "ARTE", "VAGA", "SINAL", "TEXTO", "SITE", "BLOG", "APP", "CHAT", "BOT", "FIO", "PLAY", "SAIR", "VOLTA", "FICA", "TRAZ", "LEVA", "COME", "BEBE", "FALA", "OUVE", "OLHA", "PEGA", "PARA", "ANDA", "CORRE", "PULA", "BATE", "COLA", "PISA", "REZA", "JURO"];

        let resposta = "", row = 0, col = 0, chute = ["", "", "", "", ""], fim = false;

        function entrar() {
            const n = document.getElementById('nick').value;
            if(!n) return;
            document.getElementById('login').style.display = 'none';
            document.getElementById('h-game').style.display = 'block';
            document.getElementById('kb-game').style.display = 'block';
            iniciar();
        }

        function iniciar() {
            row = 0; col = 0; chute = ["", "", "", "", ""]; fim = false;
            resposta = PALAVRAS[Math.floor(Math.random() * PALAVRAS.length)].toUpperCase();
            const cont = document.getElementById('container');
            cont.innerHTML = "";
            let g = document.createElement('div');
            g.className = "grid";
            g.style.gridTemplateColumns = "repeat(5, 1fr)";
            for(let i=0; i<30; i++) {
                let t = document.createElement('div');
                t.className = "tile"; t.id = "t"+i;
                t.onclick = () => { if(Math.floor(i/5) === row) { col = i%5; attUI(); } };
                g.appendChild(t);
            }
            cont.appendChild(g);
            montarTeclado(); attUI();
        }

        function montarTeclado() {
            const rows = [["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["ENTER","Z","X","C","V","B","N","M","DEL"]];
            rows.forEach((r, idx) => {
                const el = document.getElementById('row'+(idx+1));
                el.innerHTML = "";
                r.forEach(k => {
                    let b = document.createElement('button');
                    b.className = (k.length > 1) ? "key wide" : "key";
                    b.id = "k-"+k; b.innerText = k === "DEL" ? "⌫" : k;
                    b.onclick = () => apertar(k);
                    el.appendChild(b);
                });
            });
        }

        function apertar(k) {
            if(fim) return;
            if(k === "DEL") {
                chute[col] = "";
                document.getElementById("t"+(row*5+col)).innerText = "";
                if(col > 0) col--;
            } else if(k === "ENTER") {
                if(chute.join("").length < 5) return msg("FALTAM LETRAS");
                if(!PALAVRAS.includes(chute.join(""))) return msg("PALAVRA INVÁLIDA");
                verificar();
            } else if(col < 5) {
                chute[col] = k;
                document.getElementById("t"+(row*5+col)).innerText = k;
                if(col < 4) col++;
            }
            attUI();
        }

        function verificar() {
            let s = chute.join(""), r = resposta, tempR = r.split(""), acertos = 0;
            for(let i=0; i<5; i++) {
                let t = document.getElementById("t"+(row*5+i));
                if(s[i] === r[i]) {
                    t.classList.add("c"); tempR[i] = null; acertos++;
                }
            }
            for(let i=0; i<5; i++) {
                let t = document.getElementById("t"+(row*5+i));
                if(t.classList.contains("c")) continue;
                if(tempR.includes(s[i])) {
                    t.classList.add("p"); tempR[tempR.indexOf(s[i])] = null;
                } else { t.classList.add("a"); }
            }
            if(acertos === 5) { msg("VENCEU! 🏆"); fim = true; setTimeout(iniciar, 4000); }
            else {
                row++; col = 0; chute = ["", "", "", "", ""];
                if(row === 6) { msg("FIM! RESPOSTA: " + resposta); fim = true; setTimeout(iniciar, 5000); }
            }
        }

        function attUI() {
            for(let i=0; i<30; i++) document.getElementById("t"+i).classList.remove("selected");
            if(!fim) document.getElementById("t"+(row*5+col)).classList.add("selected");
        }

        function msg(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = "block";
            setTimeout(() => t.style.display = "none", 3000);
        }
    </script>
</body>
</html>
