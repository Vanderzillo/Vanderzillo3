<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Termo Arena Pro</title>
    <style>
        :root { --bg: #6e5c62; --tile: #615458; --correct: #3aa394; --present: #d3ad69; --absent: #312a2c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; touch-action: manipulation; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; align-items: center; }
        
        #login { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #4a3f43; padding: 30px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; }
        input { background: #312a2c; border: 2px solid #555; color: white; padding: 15px; width: 100%; border-radius: 8px; margin-bottom: 15px; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
        .btn-entrar { background: var(--correct); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        header { width: 100%; padding: 10px; text-align: center; background: rgba(0,0,0,0.1); }
        .logo { font-size: 2rem; font-weight: 900; letter-spacing: 5px; }
        
        #container { flex: 1; display: grid; gap: 10px; padding: 15px; justify-content: center; align-content: center; width: 100%; }
        .grid { display: grid; gap: 5px; }
        .tile { background: var(--tile); border: 2px solid #75666a; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 2rem; border-radius: 4px; aspect-ratio: 1/1; width: clamp(45px, 12vw, 60px); text-transform: uppercase; cursor: pointer; }
        .selected { border: 4px solid white !important; transform: scale(1.05); }
        
        .keyboard { width: 100%; padding: 10px 5px 30px; background: rgba(0,0,0,0.2); }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 8px; }
        .key { background: #818384; border: none; color: white; padding: 18px 0; border-radius: 4px; font-weight: bold; font-size: 1.1rem; flex: 1; text-align: center; }
        .key.wide { flex: 1.5; font-size: 0.7rem; }

        .c { background: var(--correct) !important; border: none; }
        .p { background: var(--present) !important; border: none; }
        .a { background: var(--absent) !important; border: none; }
        #toast { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 12px 25px; border-radius: 8px; font-weight: bold; display: none; z-index: 10000; text-align: center; }
    </style>
</head>
<body>

    <div id="login">
        <div class="card">
            <h1 style="letter-spacing:5px; margin-bottom:20px">TERMO</h1>
            <input type="text" id="nick" placeholder="SEU NOME" autocomplete="off">
            <button class="btn-entrar" onclick="entrar()">JOGAR AGORA</button>
        </div>
    </div>

    <header id="h-game" style="display:none"><div class="logo">TERMO</div></header>
    <div id="toast"></div>
    <div id="container"></div>

    <div class="keyboard" id="kb-game" style="display:none">
        <div class="kb-row" id="row1"></div>
        <div class="kb-row" id="row2"></div>
        <div class="kb-row" id="row3"></div>
    </div>

    <script>
        // LISTA DE PALAVRAS QUE PODEM SER A RESPOSTA (Sorteio)
        const RESPOSTAS_POSSIVEIS = ["AREIA", "MESAS", "CASAS", "GATOS", "LIVRO", "PRATO", "TERMO", "SAGAZ", "NOBRE", "MEXER", "AFETO", "ARENA", "SORTE", "VALOR", "VIVER", "PORTA", "FESTA", "BRASIL", "PEDRA", "MUNDO", "TEMPO", "FORTE", "LETRA", "BOLSA", "LUCRO", "JUROS", "RENDA", "CAIXA", "COFRE", "BANCO", "ATIVO", "PLANO", "SONHO", "AGUA", "FOGO", "TERRA", "VENTO"];

        let resposta = "", row = 0, col = 0, chute = ["", "", "", "", ""], fim = false;

        function entrar() {
            if(!document.getElementById('nick').value) return;
            document.getElementById('login').style.display = 'none';
            document.getElementById('h-game').style.display = 'block';
            document.getElementById('kb-game').style.display = 'block';
            novoJogo();
        }

        function novoJogo() {
            row = 0; col = 0; chute = ["", "", "", "", ""]; fim = false;
            resposta = RESPOSTAS_POSSIVEIS[Math.floor(Math.random() * RESPOSTAS_POSSIVEIS.length)];
            const cont = document.getElementById('container');
            cont.innerHTML = "";
            let g = document.createElement('div');
            g.className = "grid";
            g.style.gridTemplateColumns = "repeat(5, 1fr)";
            for(let i=0; i<30; i++) {
                let t = document.createElement('div');
                t.className = "tile"; t.id = "t"+i;
                t.onclick = () => { if(!fim && Math.floor(i/5) === row) { col = i%5; updateUI(); } };
                g.appendChild(t);
            }
            cont.appendChild(g);
            montarTeclado(); updateUI();
        }

        function montarTeclado() {
            const rows = [["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["ENTER","Z","X","C","V","B","N","M","DEL"]];
            rows.forEach((r, idx) => {
                const rowEl = document.getElementById('row'+(idx+1));
                rowEl.innerHTML = "";
                r.forEach(k => {
                    let b = document.createElement('button');
                    b.className = (k.length > 1) ? "key wide" : "key";
                    b.innerText = k === "DEL" ? "⌫" : k;
                    b.onclick = () => clicarTecla(k);
                    rowEl.appendChild(b);
                });
            });
        }

        function clicarTecla(k) {
            if(fim) return;
            let idx = row * 5 + col;
            if(k === 'DEL') {
                chute[col] = "";
                document.getElementById("t"+idx).innerText = "";
                if(col > 0) col--;
            } else if(k === 'ENTER') {
                let p = chute.join("");
                if(p.length < 5) return showToast("FALTAM LETRAS");
                
                // VALIDAR É SEMPRE VERDADEIRO AGORA PARA NÃO TRAVAR O JOGADOR
                processarEnvio();
                
            } else if(col < 5) {
                chute[col] = k;
                document.getElementById("t"+idx).innerText = k;
                if(col < 4) col++;
            }
            updateUI();
        }

        function processarEnvio() {
            let s = chute.join(""), r = resposta, tempR = r.split(""), acertos = 0;
            // Primeira passada: Verdes
            for(let i=0; i<5; i++) {
                let t = document.getElementById("t"+(row*5+i));
                if(s[i] === r[i]) {
                    t.classList.add("c"); tempR[i] = null; acertos++;
                }
            }
            // Segunda passada: Amarelos e Cinzas
            for(let i=0; i<5; i++) {
                let t = document.getElementById("t"+(row*5+i));
                if(t.classList.contains("c")) continue;
                if(tempR.includes(s[i])) {
                    t.classList.add("p"); tempR[tempR.indexOf(s[i])] = null;
                } else { t.classList.add("a"); }
            }
            if(acertos === 5) { showToast("🏆 VENCEU!"); fim = true; setTimeout(novoJogo, 4000); }
            else {
                row++; col = 0; chute = ["", "", "", "", ""];
                if(row === 6) { showToast("RESPOSTA: " + resposta); fim = true; setTimeout(novoJogo, 5000); }
            }
        }

        function updateUI() {
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
            if(!fim) {
                const target = document.getElementById("t"+(row*5+col));
                if(target) target.classList.add('selected');
            }
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
