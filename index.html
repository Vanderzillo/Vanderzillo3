<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Termo Arena Dueto</title>
    <style>
        :root { --bg: #121213; --tile: #3a3a3c; --correct: #538d4e; --present: #b59f3b; --absent: #3a3a3c; --wrong-key: #781919; --purple: #a855f7; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; align-items: center; }
        #login { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #1a1a1b; padding: 25px; border-radius: 12px; width: 100%; max-width: 320px; text-align: center; border: 1px solid #333; }
        input { background: #121213; border: 1px solid #444; color: white; padding: 12px; width: 100%; border-radius: 6px; margin: 10px 0; text-align: center; }
        button.play { background: var(--purple); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
        header { padding: 10px; width: 100%; display: flex; justify-content: space-around; align-items: center; background: #1a1a1b; font-weight: bold; }
        #container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 5px; width: 100%; max-width: 800px; flex: 1; align-content: center; }
        .grid { display: grid; gap: 3px; }
        .tile { border: 2px solid var(--tile); display: flex; align-items: center; justify-content: center; font-weight: bold; text-transform: uppercase; border-radius: 3px; font-size: 1rem; aspect-ratio: 1/1; }
        .selected { border: 2.5px solid var(--purple) !important; }
        .keyboard { width: 100%; background: #1a1a1b; padding: 8px 0; border-top: 1px solid #333; }
        .kb-row { display: flex; justify-content: center; gap: 3px; margin-bottom: 5px; }
        .key { background: #818384; border: none; color: white; padding: 15px 0; border-radius: 4px; font-weight: bold; font-size: 0.8rem; flex: 1; }
        .key.wide { flex: 1.5; background: #565758; }
        #toast { position: fixed; top: 10%; left: 50%; transform: translateX(-50%); padding: 15px 20px; border-radius: 8px; z-index: 6000; font-weight: bold; display: none; text-align: center; }
        .c { background: var(--correct) !important; border: none; }
        .p { background: var(--present) !important; border: none; }
        .a { background: var(--absent) !important; border: none; }
        .key-correct { background: var(--correct) !important; }
        .key-present { background: var(--present) !important; }
        .key-absent { background: var(--wrong-key) !important; }
        .done { opacity: 0.6; }
    </style>
</head>
<body>
    <div id="login">
        <div class="card">
            <h2 style="color:var(--purple); margin-bottom:15px">DUETO ARENA</h2>
            <input type="text" id="nick" placeholder="NICKNAME">
            <button class="play" onclick="entrar()">JOGAR DUETO</button>
        </div>
    </div>
    <header id="h" style="display:none">
        <div>DUETO</div>
        <div>🏆 <span id="pts">0</span></div>
    </header>
    <div id="toast"></div>
    <div id="container"></div>
    <div class="keyboard" id="kb" style="display:none">
        <div class="kb-row" id="row1"></div><div class="kb-row" id="row2"></div><div class="kb-row" id="row3"></div>
    </div>
    <script>
        const DIC = ["LUCRO", "JUROS", "BOLSA", "RENDA", "VERBA", "BANCO", "CAIXA", "COFRE", "PASTO", "PRATO", "ARENA", "TERMO", "MUNDO", "SORTE", "PLANO", "PODER", "SAGAZ", "TEMPO", "VALOR", "ATIVO", "GRANA", "CHAVE", "PEDRA", "FORTE", "SABER"];
        let RESPOSTAS = ["", ""]; 
        let row = 0, col = 0, fim = [false, false], totalPts = parseInt(localStorage.getItem('vanderPts')) || 0;
        let chuteArray = ["", "", "", "", ""];

        function entrar() {
            if(!document.getElementById('nick').value) return;
            document.getElementById('pts').innerText = totalPts;
            document.getElementById('login').style.display = 'none';
            document.getElementById('h').style.display = 'flex';
            document.getElementById('kb').style.display = 'block';
            novoJogo();
        }

        function novoJogo() {
            RESPOSTAS = [DIC[Math.floor(Math.random()*DIC.length)], DIC[Math.floor(Math.random()*DIC.length)]];
            while(RESPOSTAS[0] === RESPOSTAS[1]) RESPOSTAS[1] = DIC[Math.floor(Math.random()*DIC.length)];
            const cont = document.getElementById('container');
            cont.innerHTML = "";
            fim = [false, false]; row = 0; col = 0;
            for(let g=0; g<2; g++) {
                let d = document.createElement('div');
                d.className = "grid"; d.id = `grid-${g}`;
                d.style.gridTemplateRows = "repeat(9, 1fr)";
                d.style.gridTemplateColumns = "repeat(5, 1fr)";
                for(let i=0; i<45; i++) {
                    let t = document.createElement('div');
                    t.className = "tile"; t.id = `g${g}-t${i}`;
                    d.appendChild(t);
                }
                cont.appendChild(d);
            }
            updateUI();
        }

        const keys = [["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["ENTER","Z","X","C","V","B","N","M","DEL"]];
        keys.forEach((r, i) => {
            const rowEl = document.getElementById('row'+(i+1));
            r.forEach(k => {
                let b = document.createElement('button');
                b.className = (k === 'ENTER' || k === 'DEL') ? 'key wide' : 'key';
                b.id = `key-${k}`; b.innerText = k === 'DEL' ? '⌫' : k;
                b.onclick = () => press(k);
                rowEl.appendChild(b);
            });
        });

        function updateUI() {
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
            for(let g=0; g<2; g++) {
                if(!fim[g]) document.getElementById(`g${g}-t${row*5+col}`).classList.add('selected');
            }
        }

        function press(l) {
            if(fim[0] && fim[1]) return;
            if(l === 'DEL') {
                chuteArray[col] = "";
                for(let g=0; g<2; g++) if(!fim[g]) document.getElementById(`g${g}-t${row*5+col}`).innerText = "";
                if(col > 0) col--;
            } else if(l === 'ENTER') {
                if(chuteArray.join("").length < 5) return;
                verificar();
            } else if(col < 5) {
                chuteArray[col] = l;
                for(let g=0; g<2; g++) if(!fim[g]) document.getElementById(`g${g}-t${row*5+col}`).innerText = l;
                if(col < 4) col++;
            }
            updateUI();
        }

        function verificar() {
            let s = chuteArray.join("");
            for(let g=0; g<2; g++) {
                if(fim[g]) continue;
                let acertos = 0;
                let r = RESPOSTAS[g];
                let tempR = r.split("");
                
                for(let i=0; i<5; i++) {
                    let t = document.getElementById(`g${g}-t${row*5+i}`);
                    let k = document.getElementById(`key-${s[i]}`);
                    if(s[i] === r[i]) {
                        t.classList.add('c');
                        k.classList.add('key-correct');
                        tempR[i] = null; acertos++;
                    }
                }
                for(let i=0; i<5; i++) {
                    let t = document.getElementById(`g${g}-t${row*5+i}`);
                    let k = document.getElementById(`key-${s[i]}`);
                    if(t.classList.contains('c')) continue;
                    if(tempR.includes(s[i])) {
                        t.classList.add('p');
                        if(!k.classList.contains('key-correct')) k.classList.add('key-present');
                        tempR[tempR.indexOf(s[i])] = null;
                    } else {
                        t.classList.add('a');
                        if(!k.classList.contains('key-correct') && !k.classList.contains('key-present')) k.classList.add('key-absent');
                    }
                }
                if(acertos === 5) { fim[g] = true; document.getElementById(`grid-${g}`).classList.add('done'); }
            }

            if(fim[0] && fim[1]) {
                totalPts += (10 - row);
                localStorage.setItem('vanderPts', totalPts);
                document.getElementById('pts').innerText = totalPts;
                msg("DUETO VENCIDO! 🏆", "#538d4e");
                setTimeout(novoJogo, 4000);
            } else {
                row++; col = 0; chuteArray = ["", "", "", "", ""];
                if(row === 9) { msg("FIM DE JOGO! ❌", "#781919"); setTimeout(novoJogo, 4000); }
            }
            updateUI();
        }

        function msg(txt, cor) {
            const t = document.getElementById('toast');
            t.innerText = txt; t.style.backgroundColor = cor; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
