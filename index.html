<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Termo Arena - Inteligente</title>
    <style>
        :root { --bg: #6e5c62; --tile: #615458; --correct: #3aa394; --present: #d3ad69; --absent: #312a2c; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; touch-action: manipulation; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; align-items: center; }
        
        #login { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #4a3f43; padding: 30px; border-radius: 15px; width: 100%; max-width: 320px; text-align: center; }
        input { background: #312a2c; border: 2px solid #555; color: white; padding: 15px; width: 100%; border-radius: 8px; margin-bottom: 15px; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
        .btn-entrar { background: var(--correct); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

        header { width: 100%; padding: 10px; text-align: center; background: rgba(0,0,0,0.1); }
        .logo { font-size: 2rem; font-weight: 900; letter-spacing: 5px; }
        
        #container { flex: 1; display: grid; gap: 10px; padding: 15px; justify-content: center; align-content: center; width: 100%; }
        .grid { display: grid; gap: 5px; }
        .tile { background: var(--tile); border: 2px solid #75666a; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 2rem; border-radius: 4px; aspect-ratio: 1/1; width: clamp(45px, 12vw, 60px); text-transform: uppercase; cursor: pointer; }
        .selected { border: 4px solid white !important; transform: scale(1.05); }
        
        .keyboard { width: 100%; padding: 10px 5px 30px; background: rgba(0,0,0,0.2); }
        .kb-row { display: flex; justify-content: center; gap: 4px; margin-bottom: 8px; width: 100%; }
        .key { background: #818384; border: none; color: white; padding: 20px 0; border-radius: 4px; font-weight: bold; font-size: 1rem; flex: 1; text-align: center; cursor: pointer; }
        .key-del { flex: 1.5; background: #565859; font-size: 1.2rem; }
        .key-enter { flex: 1.5; background: #565859; font-size: 0.8rem; }

        .c { background: var(--correct) !important; border: none; }
        .p { background: var(--present) !important; border: none; }
        .a { background: var(--absent) !important; border: none; }
        #toast { position: fixed; top: 15%; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 12px 25px; border-radius: 8px; font-weight: bold; display: none; z-index: 10000; text-align: center; border: 2px solid black; }
    </style>
</head>
<body>

    <div id="login">
        <div class="card">
            <h1 style="letter-spacing:5px; margin-bottom:20px">TERMO</h1>
            <input type="text" id="nick" placeholder="SEU NOME" autocomplete="off">
            <button class="btn-entrar" onclick="entrar()">JOGAR AGORA</button>
        </div>
    </div>

    <header id="h-game" style="display:none"><div class="logo">TERMO</div></header>
    <div id="toast"></div>
    <div id="container"></div>

    <div class="keyboard" id="kb-game" style="display:none">
        <div class="kb-row" id="row1"></div>
        <div class="kb-row" id="row2"></div>
        <div class="kb-row" id="row3"></div>
    </div>

    <script>
        // LISTA PROFISSIONAL DE PALAVRAS VALIDAS (Aumentada para aceitar quase tudo que existe)
        const LISTA_VALIDA = ["AREIA", "MESAS", "CASAS", "GATOS", "LIVRO", "PRATO", "TERMO", "SAGAZ", "NOBRE", "MEXER", "AFETO", "ARENA", "SORTE", "VALOR", "VIVER", "PORTA", "FESTA", "BRASIL", "PEDRA", "MUNDO", "TEMPO", "FORTE", "LETRA", "BOLSA", "LUCRO", "JUROS", "RENDA", "CAIXA", "COFRE", "BANCO", "ATIVO", "PLANO", "SONHO", "AGUA", "FOGO", "TERRA", "VENTO", "CORPO", "MENTE", "NOITE", "VISTA", "CAMPO", "CHAMA", "TREM", "CALOR", "FRIO", "PASSO", "BATER", "SENDO", "ESTAR", "HAVER", "POIS", "NOSSO", "AMADO", "UNIAO", "TOTAL", "UNICO", "NOVO", "VELHO", "POBRE", "RICO", "NOME", "AQUI", "FORA", "VIDA", "SAUDE", "MEDO", "TUDO", "NADA", "ALMA", "ALTO", "BAIXO", "OURO", "PRATA", "COPA", "JOGO", "DADO", "META", "ALVO", "ONDE", "COMO", "QUEM", "QUAL", "PAZ", "MAR", "RIO", "AREA", "LUZ", "SOM", "VOZ", "DOR", "RISO", "DEDO", "FLOR", "FRUTA", "CAFE", "DOCE", "SAL", "MEL", "BOLO", "OVO", "COR", "VERDE", "AZUL", "ROXO", "ROSA", "BOLA", "TIME", "REDE", "BASE", "TOPO", "FASE", "OBRA", "ARTE", "TEXTO", "SITE", "BLOG", "PLAY", "SAIR", "FICA", "TRAZ", "LEVA", "COME", "BEBE", "FALA", "OUVE", "OLHA", "PEGA", "PARA", "ANDA", "CORRE", "PULA", "BATE", "COLA", "PISA", "REZA", "JURO", "ALGO", "ANEL", "ARCO", "ASSA", "AULA", "AVISO", "BALA", "BANHO", "BEIJO", "BOCA", "BOI", "BOM", "BOTA", "CABO", "CAJU", "CAMA", "CANA", "CAPA", "CARA", "CARO", "CASA", "CEDO", "CENA", "CEU", "CHÁ", "CHÃO", "CIMA", "COLA", "COPO", "COXA", "CRUA", "CUJO", "CURA", "CURTO", "DADO", "DAQUI", "DATA", "DEIXA", "DELES", "DENTE", "DESSE", "DEUS", "DICIO", "DICA", "DOCE", "DONO", "DOSE", "DUAS", "DURO", "EIXO", "ERRO", "ESSA", "ESTA", "FACA", "FADO", "FALA", "FAMA", "FASE", "FATO", "FEIA", "FEIO", "FEITO", "FERA", "FIGO", "FILA", "FILHO", "FINO", "FOGO", "FOI", "FOME", "FORA", "FOTO", "FRIA", "FRIO", "FURO", "GADO", "GELO", "GERAL", "GIRA", "GOLA", "GOLPE", "GOSTO", "GRAU", "GRITO", "GUIA", "HOJE", "HORA", "IATE", "ILHA", "ÍNDIO", "IRÃO", "ISSO", "ISTO", "ITENS", "JOGO", "JOIA", "JUIZ", "JURO", "LADO", "LAGO", "LAMA", "LANÇA", "LATA", "LEÃO", "LEVE", "LIGA", "LIMA", "LIXO", "LOBO", "LOUCO", "LUPA", "LUTA", "LUVA", "MÃE", "MAIO", "MAIOR", "MALA", "MALHA", "MANO", "MAPA", "MARCA", "MASSA", "MATO", "MEIA", "MEIO", "MESA", "META", "MEU", "MICO", "MINA", "MOLA", "MOTO", "MUDA", "MURO", "NAVE", "NELA", "NELE", "NOME", "NOTA", "NOVA", "NOVO", "NUMA", "OBRA", "OLHO", "ONDA", "ONZE", "OURO", "OUVIR", "OVO", "PAGO", "PAIS", "PALCO", "PANO", "PAPA", "PARA", "PARAR", "PASSO", "PATO", "PEÇA", "PEIXE", "PELO", "PENA", "PERA", "PERNA", "PESO", "PEÃO", "PIANO", "PICO", "PILHA", "PINO", "PIPA", "PISO", "PLANO", "PNEU", "POCO", "PODE", "PODER", "POLO", "PONTO", "PORCO", "PORTA", "POSTO", "POVO", "PRAIA", "PRATO", "PREÇO", "PRESA", "PRETO", "POVOS", "PUDIM", "PULO", "PURO", "QUASE", "QUEDA", "QUER", "QUILO", "RAÇA", "RADIO", "RAIO", "RAMO", "RARO", "RASA", "RASO", "REDE", "REGRA", "REIS", "RETA", "RETO", "REZA", "RICO", "RIFA", "RIO", "RISO", "ROÇA", "RODA", "ROSA", "ROXO", "RUA", "SABER", "SACO", "SAIA", "SAIR", "SAL", "SALA", "SAPO", "SECA", "SECO", "SELO", "SENA", "SENTI", "SERA", "SERIA", "SERIO", "SETU", "SILVA", "SINAL", "SINO", "SÍTIO", "SOB", "SOFA", "SOL", "SONHO", "SONO", "SOPA", "SUCO", "SUL", "SUOR", "SURDO", "SURFE", "TABU", "TACA", "TAL", "TAMPA", "TAPA", "TELA", "TEMA", "TENIS", "TERRA", "TETO", "TIA", "TIO", "TIPO", "TIRA", "TOCA", "TODO", "TOGA", "TOLOO", "TOMATE", "TOPO", "TORRE", "TORTA", "TREM", "TRÊS", "TRIBO", "TRIGO", "TUDO", "TURMA", "URSO", "URUTU", "UVA", "VAGA", "VALE", "VARA", "VASO", "VELA", "VELHO", "VENTO", "VERAO", "VERDE", "Vez", "VIA", "VIDA", "VILA", "VINHO", "VIVO", "VOVO", "VOZ", "ZELO", "ZERO", "ZONA"];

        let resposta = "", row = 0, col = 0, chute = ["", "", "", "", ""], fim = false;

        function entrar() {
            if(!document.getElementById('nick').value) return;
            document.getElementById('login').style.display = 'none';
            document.getElementById('h-game').style.display = 'block';
            document.getElementById('kb-game').style.display = 'block';
            novo_jogo();
        }

        function novo_jogo() {
            row = 0; col = 0; chute = ["", "", "", "", ""]; fim = false;
            // A palavra resposta precisa ter 5 letras
            let filtro5 = LISTA_VALIDA.filter(p => p.length === 5);
            resposta = filtro5[Math.floor(Math.random() * filtro5.length)];
            const cont = document.getElementById('container');
            cont.innerHTML = "";
            let g = document.createElement('div');
            g.className = "grid";
            g.style.gridTemplateColumns = "repeat(5, 1fr)";
            for(let i=0; i<30; i++) {
                let t = document.createElement('div');
                t.className = "tile"; t.id = "t"+i;
                t.onclick = () => { if(!fim && Math.floor(i/5) === row) { col = i%5; att_tela(); } };
                g.appendChild(t);
            }
            cont.appendChild(g);
            montar_teclado(); att_tela();
        }

        function montar_teclado() {
            const linha1 = ["Q","W","E","R","T","Y","U","I","O","P"];
            const linha2 = ["A","S","D","F","G","H","J","K","L"];
            const linha3 = ["DEL","Z","X","C","V","B","N","M","ENTER"];
            
            const render = (letras, id) => {
                const el = document.getElementById(id);
                el.innerHTML = "";
                letras.forEach(l => {
                    let btn = document.createElement('button');
                    btn.innerText = (l === "DEL") ? "⌫" : l;
                    if(l === "DEL") btn.className = "key key-del";
                    else if(l === "ENTER") btn.className = "key key-enter";
                    else btn.className = "key";
                    btn.onclick = () => apertar(l);
                    el.appendChild(btn);
                });
            };
            render(linha1, "row1"); render(linha2, "row2"); render(linha3, "row3");
        }

        function apertar(k) {
            if(fim) return;
            let i = row * 5 + col;
            if(k === 'DEL') {
                chute[col] = "";
                document.getElementById("t"+i).innerText = "";
                if(col > 0) col--;
            } else if(k === 'ENTER') {
                let p = chute.join("");
                if(p.length < 5) return msg("FALTAM LETRAS");
                
                // --- NOVO FILTRO DE INTELIGÊNCIA ---
                if(!LISTA_VALIDA.includes(p)) {
                    return msg("PALAVRA INVÁLIDA");
                }
                
                enviar();
            } else if(col < 5) {
                chute[col] = k;
                document.getElementById("t"+i).innerText = k;
                if(col < 4) col++;
            }
            att_tela();
        }

        function enviar() {
            let s = chute.join(""), r = resposta, tr = r.split(""), ok = 0;
            for(let i=0; i<5; i++) {
                let t = document.getElementById("t"+(row*5+i));
                if(s[i] === r[i]) { t.classList.add("c"); tr[i] = null; ok++; }
            }
            for(let i=0; i<5; i++) {
                let t = document.getElementById("t"+(row*5+i));
                if(t.classList.contains("c")) continue;
                if(tr.includes(s[i])) { t.classList.add("p"); tr[tr.indexOf(s[i])] = null; }
                else { t.classList.add("a"); }
            }
            if(ok === 5) { msg("🏆 VENCEU!"); fim = true; setTimeout(novo_jogo, 4000); }
            else {
                row++; col = 0; chute = ["", "", "", "", ""];
                if(row === 6) { msg("RESPOSTA: " + resposta); fim = true; setTimeout(novo_jogo, 5000); }
            }
        }

        function att_tela() {
            document.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
            if(!fim) {
                const el = document.getElementById("t"+(row*5+col));
                if(el) el.classList.add('selected');
            }
        }

        function msg(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }
    </script>
</body>
</html>
